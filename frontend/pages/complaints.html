<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serene Resolver — My Complaints</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .filter-bar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap }
    .search-box { display:flex;align-items:center;gap:8px;background:white;border:1px solid var(--gray-200);border-radius:8px;padding:9px 14px;flex:1;max-width:320px }
    .search-box input { border:none;background:none;font-size:13px;font-family:var(--font-body);color:var(--gray-700);width:100%;outline:none }
    .filter-sel { padding:9px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;font-family:var(--font-body);background:white;color:var(--gray-700);outline:none }
    .list-item { background:white;border:1px solid var(--gray-200);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .2s;display:grid;grid-template-columns:auto 1fr auto auto;gap:16px;align-items:center }
    .list-item:hover { box-shadow:var(--shadow);transform:translateY(-1px) }
    .list-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0 }
    .list-dot.pending    { background:var(--amber) }
    .list-dot.in_progress{ background:var(--blue) }
    .list-dot.resolved   { background:var(--green) }
    .list-dot.closed     { background:var(--gray-400) }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>Serene Resolver</h2>
      <span>Student Portal · Academic Sanctuary</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/></svg>
        Dashboard
      </a>
      <a class="nav-item active" href="complaints.html">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Complaints
      </a>
      <a class="nav-item" href="status.html">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Status
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="raise-btn" onclick="openRaiseModal()">+ Raise Complaint</button>
      <button class="nav-item" onclick="logout()">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <header class="topbar">
    <span style="font-family:var(--font-main);font-weight:600;font-size:13px;color:var(--gray-700)">Complaints</span>
    <div class="topbar-right">
      <div class="user-chip" id="user-chip"></div>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <h1>My Complaints</h1>
      <p>All your raised complaints — search, filter, and track in real time.</p>
    </div>

    <div class="filter-bar">
      <div class="search-box">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search" type="text" placeholder="Search complaints..." oninput="applyFilters()">
      </div>
      <select class="filter-sel" id="f-status" onchange="applyFilters()">
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="in_progress">In Progress</option>
        <option value="resolved">Resolved</option>
        <option value="closed">Closed</option>
      </select>
      <select class="filter-sel" id="f-category" onchange="applyFilters()">
        <option value="">All Categories</option>
        <option>Electrical</option><option>Plumbing</option><option>Internet</option>
        <option>Water</option><option>Maintenance</option><option>Mess</option>
        <option>Noise</option><option>Other</option>
      </select>
      <select class="filter-sel" id="f-priority" onchange="applyFilters()">
        <option value="">All Priorities</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>
      </select>
    </div>

    <div id="list-count" style="font-size:13px;color:var(--gray-400);margin-bottom:12px"></div>
    <div id="complaints-list"></div>
  </main>
</div>

<!-- Raise modal (same as dashboard) -->
<div id="raise-modal" class="modal-overlay" style="display:none" onclick="closeOnOverlay(event,'raise-modal')">
  <div class="modal">
    <div class="modal-header">
      <h2>✦ Raise a Complaint</h2>
      <button class="close-btn" onclick="closeModal('raise-modal')">×</button>
    </div>
    <div class="modal-body">
      <div id="raise-alert" class="alert" style="display:none"></div>
      <form id="raise-form" onsubmit="submitComplaint(event)">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="r-category" class="form-select" required>
            <option value="">Select category...</option>
            <option>Electrical</option><option>Plumbing</option><option>Internet</option>
            <option>Water</option><option>Maintenance</option><option>Mess</option><option>Noise</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input id="r-title" class="form-input" type="text" placeholder="Brief description of the issue" required>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="r-desc" class="form-textarea" placeholder="Explain the issue in detail..." required></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Priority</label>
            <select id="r-priority" class="form-select">
              <option value="low">Low</option><option value="medium" selected>Medium</option>
              <option value="high">High</option><option value="critical">Critical</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Attach Image</label>
            <input id="r-image" class="form-input" type="file" accept="image/*" style="padding:6px">
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('raise-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="el('raise-form').dispatchEvent(new Event('submit',{cancelable:true,bubbles:true}))">Submit</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  let allComplaints = [];

  window.onload = async () => {
    if (!requireAuth()) return;
    renderUserChip();
    allComplaints = await apiFetch('/complaints');
    renderList(allComplaints);
  };

  function renderList(list) {
    el('list-count').textContent = `${list.length} complaint${list.length !== 1 ? 's' : ''}`;
    if (!list.length) {
      el('complaints-list').innerHTML = `<div class="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <h3>No complaints match your filters</h3></div>`;
      return;
    }
    el('complaints-list').innerHTML = list.map(c => `
      <div class="list-item" onclick="window.location.href='detail.html?id=${c._id}'">
        <div class="list-dot ${c.status.replace('_','')}"></div>
        <div>
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
            <span style="font-size:10.5px;font-weight:700;text-transform:uppercase;color:var(--blue)">${c.category}</span>
            <span style="font-size:11px;color:var(--gray-400)">#${c.complaintId}</span>
          </div>
          <div style="font-size:14px;font-weight:600;color:var(--gray-900);margin-bottom:4px">${c.title}</div>
          <div style="font-size:12px;color:var(--gray-400)">${formatDate(c.createdAt)} · Updated ${timeAgo(c.updatedAt)}</div>
        </div>
        ${priorityBadge(c.priority)}
        ${statusBadge(c.status)}
      </div>`).join('');
  }

  function applyFilters() {
    const search   = el('search').value.toLowerCase();
    const status   = el('f-status').value;
    const category = el('f-category').value;
    const priority = el('f-priority').value;

    const filtered = allComplaints.filter(c => {
      if (status   && c.status !== status) return false;
      if (category && c.category !== category) return false;
      if (priority && c.priority !== priority) return false;
      if (search && !c.title.toLowerCase().includes(search) && !c.description.toLowerCase().includes(search) && !c.complaintId.toLowerCase().includes(search)) return false;
      return true;
    });
    renderList(filtered);
  }

  function openRaiseModal() { el('raise-modal').style.display = 'flex'; }
  function closeModal(id) { el(id).style.display = 'none'; }
  function closeOnOverlay(e, id) { if (e.target === el(id)) closeModal(id); }

  async function submitComplaint(e) {
    e.preventDefault();
    const user = getUser();
    const fd = new FormData();
    fd.append('category', el('r-category').value);
    fd.append('title', el('r-title').value);
    fd.append('description', el('r-desc').value);
    fd.append('priority', el('r-priority').value);
    fd.append('room', user.room || 'N/A');
    fd.append('block', user.block || 'N/A');
    const imgFile = el('r-image').files[0];
    if (imgFile) fd.append('image', imgFile);

    try {
      await apiFetch('/complaints', { method:'POST', body: fd, headers:{} });
      showAlert('raise-alert', 'Complaint submitted!', 'success');
      setTimeout(async () => {
        closeModal('raise-modal');
        el('raise-form').reset();
        allComplaints = await apiFetch('/complaints');
        renderList(allComplaints);
      }, 1000);
    } catch(err) { showAlert('raise-alert', err.message); }
  }
</script>
</body>
</html>
